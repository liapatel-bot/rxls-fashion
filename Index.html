<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXLS Fashion | Streetwear</title>
    <style>
        :root {
            --red: #ff0000;
            --black: #0a0a0a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: var(--black);
            color: #fff;
            line-height: 1.6;
        }
        header {
            background: #000;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 3px solid var(--red);
        }
        .logo { font-size: 2.5rem; font-weight: bold; color: var(--red); }
        nav { padding: 1rem; background: #111; text-align: center; }
        nav a { color: #fff; margin: 0 20px; text-decoration: none; font-weight: bold; }
        
        .hero {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://source.unsplash.com/random/1600x900/?fashion,model') center/cover;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero h1 { font-size: 4rem; color: var(--red); }
        
        .products {
            padding: 60px 20px;
            max-width: 1200px;
            margin: auto;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .product {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .product:hover { transform: scale(1.05); }
        .product img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
            text-align: center;
        }
        .add-to-cart {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--red);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }
        
        .cart { display: none; position: fixed; top: 0; right: 0; width: 400px; height: 100%; background: #111; padding: 20px; overflow-y: auto; z-index: 2000; }
        .cart-item { display: flex; margin: 15px 0; border-bottom: 1px solid #333; padding-bottom: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">RXLS</div>
        <p>FASHION</p>
    </header>
    
    <nav>
        <a href="#">Shop</a>
        <a href="#">New Arrivals</a>
        <a href="#">Collections</a>
        <a href="#">Contact</a>
    </nav>

    <div class="hero">
        <div>
            <h1>FEARLESS STYLE</h1>
            <p>Premium Streetwear • Limited Drops</p>
        </div>
    </div>

    <div class="products">
        <h2 style="text-align:center; margin-bottom:40px; color:var(--red);">Latest Drops</h2>
        <div class="product-grid" id="productGrid"></div>
    </div>
